<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Proti Bowls Admin Application">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Proti Bowls Admin">

  <link rel="icon" type="image/png" href="logo.png">
  <link rel="manifest" href="manifest.json">

  <title>Proti Bowls Admin</title>
  <link rel="stylesheet" type="text/css" href="flutter.css">
  <style id="flutter-loader-script"></style>
</head>
<body>
  <!--
    Flutter web (CanvasKit) renders into a WebGL canvas. Two things can turn the
    whole app dark/black when this browser tab is switched away and back:

      1. The tab is backgrounded long enough that the browser drops the WebGL/GPU
         context ("webglcontextlost"). The canvas can't repaint and comes back
         black — a reload restores it cleanly.

      2. The common case: the tab is simply switched and the context is NOT lost,
         but Flutter pauses rendering while hidden and doesn't always repaint on
         return, leaving a stale black canvas. No "webglcontextlost" fires here,
         so the reload below never triggers. Dispatching a synthetic resize when
         the page becomes visible forces Flutter's engine to handle a metrics
         change and repaint the scene — without a reload, so page state is kept.
  -->
  <script>
    // Case 1: genuine GPU context loss after long backgrounding.
    window.addEventListener('webglcontextlost', function () {
      window.location.reload();
    }, true);

    // Case 2: quick tab switch — nudge Flutter to repaint on return.
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') {
        window.dispatchEvent(new Event('resize'));
      }
    });
  </script>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorkerVersion: null,
      }).then(function(engineInitializer) {
        return engineInitializer.initializeEngine();
      }).then(function(appRunner) {
        return appRunner.runApp();
      });
    });
  </script>
</body>
</html>
